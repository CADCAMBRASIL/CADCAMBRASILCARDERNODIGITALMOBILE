<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CNC Mobile - Profº Fernando</title>
    <style>
        :root { 
            --primary: #000000; 
            --accent: #2ecc71; 
            --bg: #f4f7f6; 
            --error: #ff4d4d; 
            --industrial: #DCDCDC;
        }

        /* Reset para Mobile */
        * { box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; background: var(--bg); 
            display: flex; flex-direction: column;
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Header e Nome Aluno */
        .header-mobile {
            background: var(--industrial);
            padding: 10px; border-bottom: 2px solid #bbb;
            display: flex; flex-direction: column; gap: 8px;
        }
        .input-aluno {
            width: 100%; padding: 12px; border: 1px solid #999;
            border-radius: 5px; font-size: 16px; /* Evita zoom automático no iOS */
        }

        /* Seleção de Exercícios (Scroll Horizontal) */
        #nav-exercicios {
            display: flex; overflow-x: auto; background: var(--primary);
            padding: 8px; gap: 8px; white-space: nowrap;
            -webkit-overflow-scrolling: touch;
        }
        .ex-btn {
            padding: 8px 15px; background: #333; border: none;
            color: white; border-radius: 4px; font-size: 13px;
        }
        .active { background: var(--accent) !important; font-weight: bold; }

        /* Área de Conteúdo principal com Scroll */
        #content-scroll {
            flex: 1; overflow-y: auto; padding: 10px;
            display: flex; flex-direction: column; gap: 15px;
        }

        /* Imagem e Descrição */
        #container-desenho {
            width: 100%; height: 250px; background: white;
            border: 2px solid #bdc3c7; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
        }
        #img-desenho { max-width: 95%; max-height: 95%; object-fit: contain; }

        #container-descricao {
            background: white; padding: 12px; border-radius: 8px;
            border: 1px solid #bdc3c7; font-size: 14px;
        }

        /* Programação Mobile: Aluno em cima, Gabarito logo abaixo */
        .bloco-linha {
            display: flex; flex-direction: column; gap: 5px;
            margin-bottom: 15px; background: #eee; padding: 8px;
            border-radius: 6px; border-left: 4px solid #999;
        }
        .painel-aluno { font-family: monospace; font-size: 14px; display: flex; flex-wrap: wrap; align-items: center; }
        .painel-gabarito { 
            font-family: monospace; font-size: 13px; color: #555;
            background: #d1d1d1; padding: 5px; border-radius: 4px;
            display: none; /* Escondido no mobile até validar */
        }

        /* Lacunas maiores para dedos */
        .input-lacuna {
            width: 70px; height: 35px; border: 2px solid #999;
            text-align: center; font-weight: bold; font-size: 16px;
            margin: 2px; border-radius: 4px; outline: none;
        }
        .input-erro { border-color: var(--error); background: #fceae9; }
        .input-sucesso { border-color: var(--accent); background: #e9fce9; }

        /* Footer Fixo */
        footer {
            padding: 10px; background: var(--industrial);
            border-top: 2px solid #bbb; text-align: center;
        }
        .btn-save {
            width: 100%; background: #000; color: white;
            padding: 15px; border: none; border-radius: 8px;
            font-weight: bold; font-size: 16px;
        }

        /* Revelação */
        .revelado { display: block !important; border: 1px solid var(--accent); }
        .revelado-erro { display: block !important; border: 1px solid var(--error); background: #f8d7da; }
    </style>
</head>
<body>

    <div class="header-mobile">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <b id="tit-ex" style="font-size: 14px;">Selecione o Treino</b>
            <span style="font-size: 12px; font-weight: bold;">Profº Fernando</span>
        </div>
        <input type="text" id="nome-aluno" class="input-aluno" placeholder="Nome do Aluno">
    </div>

    <div id="nav-exercicios">
        </div>

    <div id="content-scroll">
        <div id="container-desenho">
            <img id="img-desenho" src="" alt="Desenho">
        </div>

        <div id="container-descricao">
            <h4 style="margin:0 0 8px 0; font-size: 15px;">Instruções de Trabalho</h4>
            <div id="texto-descricao"></div>
        </div>

        <div id="area-programacao">
            <h4 style="margin: 0 0 10px 0;">Sua Programação:</h4>
            <div id="container-linhas-mobile"></div>
        </div>
    </div>

    <footer>
        <button class="btn-save" onclick="gerarTXT()">BAIXAR TXT FINAL</button>
    </footer>

    <script>
        // O Gabarito permanece o mesmo da versão Desktop
        const programasTreino = {
            1: {
                descricao: "<b>Torneamento Externo:</b><br>1. Cabeçalho O0001.<br>2. Desbaste G71.<br>3. Troca em X200 Z200.",
                linhas: [
                    { n: "N10", texto: "O[lacuna]", resp:["0001"], original: "O0001" },
                    { n: "N20", texto: "G[lacuna] G[lacuna] G[lacuna] G[lacuna]", resp:["21","40","90","95"], original: "G21 G40 G90 G95" },
                    { n: "N30", texto: "G[lacuna] G[lacuna] X[lacuna] Z[lacuna]", resp:["54","0","200","200"], original: "G54 G0 X200 Z200" },
                    { n: "N40", texto: "T[lacuna] ", resp:["0101"], original: "T0101" },
                    { n: "N50", texto: "G[lacuna] ", resp:["54"], original: "G54" },
                    { n: "N60", texto: "G[lacuna] S[lacuna]", resp:["96","200"], original: "G96 S200" },
                    { n: "N70", texto: "G[lacuna] S[lacuna] M[lacuna]", resp:["92","2000","4" ], original: "G92 S2000 M4" },
                    { n: "N80", texto: "G0 X[lacuna] Z[lacuna] ", resp:["52","2"], original: "G0 X52 Z2" },
                    { n: "N90", texto: "G71 U[lacuna] R[lacuna] ", resp:["2","1"], original: "G71 U2 R1" },
                    { n: "N100", texto: "G71 P[lacuna] Q[lacuna] U[lacuna] W[lacuna] F[lacuna]", resp:["110","210","1","0.05","0.25"], original: "G71 P110 Q210 U1 W0.05 F0.25" },
                    { n: "N110", texto: "G0 X[lacuna] Z[lacuna] ", resp:["22","2"], original: "G0 X22 Z2" },
                    { n: "N120", texto: "G1 Z[lacuna] F[lacuna] ", resp:["0","0.12"], original: "G1 Z0 F0.12" },
                    { n: "N130", texto: "X[lacuna] Z[lacuna] ", resp:["24","-1"], original: "X24 Z-1" },
                    { n: "N140", texto: "Z[lacuna] ", resp:["-20"], original: "Z-20" },
                    { n: "N150", texto: "X[lacuna] ", resp:["30"], original: "X30" },
                    { n: "N160", texto: "Z[lacuna] ", resp:["-30"], original: "Z-30" },
                    { n: "N170", texto: "X[lacuna] Z[lacuna] ", resp:["38","-49"], original: "X38 Z-39" },
                    { n: "N180", texto: "Z[lacuna] ", resp:["-77"], original: "Z-77" },
                    { n: "N190", texto: "X[lacuna]", resp:["46"], original: "X46" },
                    { n: "N200", texto: "X[lacuna] Z[lacuna] ", resp:["50","-79"], original: "X50 Z-79" },
                    { n: "N210", texto: "X[lacuna] ", resp:["52"], original: "X52" },
                    { n: "N220", texto: "G[lacuna] G[lacuna] X[lacuna] Z[lacuna] ", resp:["54","0","200","200"], original: "G54 G0 X200 Z200" },
                    { n: "N230", texto: "M[lacuna] ", resp:["30"], original: "M30" }
                ]
            }
        };

        const exercicios = Array.from({length: 10}, (_, i) => ({
            id: i + 1, titulo: `EX ${i + 1}`, imagem: `ex${i + 1}.jpg`
        }));

        let exAtual = 1;

        function mudarExercicio(id) {
            exAtual = id;
            document.querySelectorAll('.ex-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${id}`).classList.add('active');

            const ex = exercicios.find(e => e.id === id);
            document.getElementById('tit-ex').innerText = `Exercício ${id}`;
            document.getElementById('img-desenho').src = ex.imagem;

            const container = document.getElementById('container-linhas-mobile');
            const textoDesc = document.getElementById('texto-descricao');
            container.innerHTML = "";
            
            const dadosEx = programasTreino[id] || { descricao: "Sem instruções", linhas: [] };
            textoDesc.innerHTML = dadosEx.descricao;

            dadosEx.linhas.forEach((linha, lIdx) => {
                const bloco = document.createElement('div');
                bloco.className = 'bloco-linha';
                
                let htmlA = `<div class="painel-aluno"><b style="color:red; width:45px;">${linha.n}</b> `;
                let partes = linha.texto.split('[lacuna]');
                partes.forEach((p, i) => {
                    htmlA += p;
                    if (i < partes.length - 1) {
                        htmlA += `<input type="text" inputmode="text" class="input-lacuna" data-lin="${lIdx}" data-resp="${linha.resp[i]}" onchange="verificar(this)">`;
                    }
                });
                htmlA += `</div><div class="painel-gabarito" id="gab-${lIdx}">GABARITO: ${linha.original}</div>`;
                
                bloco.innerHTML = htmlA;
                container.appendChild(bloco);
            });
        }

        function verificar(input) {
            const val = input.value.toUpperCase().trim();
            const resp = input.dataset.resp.toUpperCase();
            const linId = input.dataset.lin;
            const bloco = input.closest('.bloco-linha');
            const gabDiv = bloco.querySelector('.painel-gabarito');

            if (val === resp) {
                input.className = 'input-lacuna input-sucesso';
                input.disabled = true;
            } else {
                input.className = 'input-lacuna input-erro';
            }

            const lacunas = Array.from(bloco.querySelectorAll('.input-lacuna'));
            const todasPreenchidas = lacunas.every(inp => inp.value.trim() !== "");
            const todasCertas = lacunas.every(inp => inp.disabled);

            if (todasPreenchidas) {
                gabDiv.className = todasCertas ? 'painel-gabarito revelado' : 'painel-gabarito revelado-erro';
            }
        }

        function gerarTXT() {
            const nome = document.getElementById('nome-aluno').value.trim();
            const desc = document.getElementById('texto-descricao').innerText;
            if (!nome) { alert("Digite o nome!"); return; }

            let txt = `RELATÓRIO CNC MOBILE\nALUNO: ${nome}\nEX: ${exAtual}\n\nINSTRUÇÕES:\n${desc}\n\nCÓDIGO:\n`;
            
            document.querySelectorAll('.bloco-linha').forEach(bloco => {
                const linhaN = bloco.querySelector('b').innerText;
                let textoCompleto = linhaN + " ";
                const inputs = bloco.querySelectorAll('.input-lacuna');
                const partesTexto = bloco.querySelector('.painel-aluno').innerText.replace(linhaN, "").split("\n");
                
                // Lógica simplificada de exportação para mobile
                let idxInput = 0;
                let inner = bloco.querySelector('.painel-aluno');
                inner.childNodes.forEach(node => {
                    if (node.nodeType === 3) textoCompleto += node.textContent;
                    else if (node.tagName === "INPUT") textoCompleto += node.value;
                });
                txt += textoCompleto.trim() + "\n";
            });

            const blob = new Blob([txt], { type: "text/plain" });
            const a = document.createElement("a");
            a.download = `CNC_Mobile_${nome}.txt`;
            a.href = window.URL.createObjectURL(blob);
            a.click();
        }

        // Criar Menu Superior
        const menu = document.getElementById('nav-exercicios');
        exercicios.forEach(ex => {
            const b = document.createElement('button');
            b.className = 'ex-btn'; b.id = `btn-${ex.id}`; b.innerText = ex.titulo;
            b.onclick = () => mudarExercicio(ex.id);
            menu.appendChild(b);
        });

        mudarExercicio(1);
    </script>
</body>
</html>
